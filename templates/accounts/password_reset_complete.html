{% extends "base.html" %}
{% load static %}

{% block title %}Password Updated{% endblock %}

{% block content %}
<div class="auth-page">
  <div style="width: 100%; max-width: 420px;">

    <div class="auth-logo">
      <img src="{% static 'images/logo.png' %}" alt="{{ PLATFORM_NAME }} Logo">
      <h1>Password updated</h1>
      <p>Your password has been changed successfully. You can now sign in with your new password.</p>
    </div>

    <div class="auth-card">
      <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-block">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
