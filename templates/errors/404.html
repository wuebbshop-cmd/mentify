{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="container" style="min-height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center;">
  <div style="text-align: center; padding: 64px 0;">
    <div style="font-size: 6rem; line-height: 1; margin-bottom: 16px;"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <h1 class="text-gradient" style="font-size: 5rem; margin-bottom: 8px;">404</h1>
    <h2 style="color: var(--text-muted); margin-bottom: 24px;">Page Not Found</h2>
    <p style="color: var(--text-muted); max-width: 360px; margin: 0 auto 40px;">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="{% url 'home' %}" class="btn btn-primary">← Back to Home</a>
  </div>
</div>
{% endblock %}
