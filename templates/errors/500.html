{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="container" style="min-height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center;">
  <div style="text-align: center; padding: 64px 0;">
    <div style="font-size: 5rem; line-height: 1; margin-bottom: 16px;">⚠️</div>
    <h1 class="text-gradient" style="font-size: 5rem; margin-bottom: 8px;">500</h1>
    <h2 style="color: var(--text-muted); margin-bottom: 24px;">Something Went Wrong</h2>
    <p style="color: var(--text-muted); max-width: 400px; margin: 0 auto 40px;">
      Our team has been notified. Please try again in a moment.
    </p>
    <a href="{% url 'home' %}" class="btn btn-primary">← Back to Home</a>
  </div>
</div>
{% endblock %}
