{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="container" style="min-height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center;">
    <div style="width: 72px; height: 72px; background: rgba(220,38,38,0.1); color: #dc2626; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <h1 class="text-gradient" style="font-size: 5rem; margin-bottom: 8px;">500</h1>
    <h2 style="color: var(--text-muted); margin-bottom: 24px;">Something Went Wrong</h2>
    <p style="color: var(--text-muted); max-width: 400px; margin: 0 auto 40px;">
      Our team has been notified. Please try again in a moment.
    </p>
    <a href="{% url 'home' %}" class="btn btn-primary">← Back to Home</a>
  </div>
</div>
{% endblock %}
